name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: ubuntu-22.04
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: macos
            arch: universal
          - os: ubuntu-22.04
            platform: android
            arch: arm64
          - os: ubuntu-22.04
            platform: android
            arch: arm32
          - os: ubuntu-22.04
            platform: android
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            libasound2-dev libmpv-dev mpv

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          brew update
          brew install pkg-config gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad

          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix gstreamer)/lib/pkgconfig:$(brew --prefix gst-plugins-base)/lib/pkgconfig:$(brew --prefix gst-plugins-good)/lib/pkgconfig:$(brew --prefix gst-plugins-bad)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install -y gstreamer gstreamer-devel

          $gstRoot = [Environment]::GetEnvironmentVariable('GSTREAMER_1_0_ROOT_MSVC_X86_64', 'Machine')
          if ([string]::IsNullOrWhiteSpace($gstRoot)) {
            $gstRoot = 'C:\gstreamer\1.0\msvc_x86_64'
          }
          $gstBin = Join-Path $gstRoot 'bin'
          $gstHeader = Join-Path $gstRoot 'include\gstreamer-1.0\gst\gst.h'

          if (-not (Test-Path $gstHeader)) {
            Write-Error "GStreamer headers not found at: $gstHeader"
            exit 1
          }

          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $gstBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Enable desktop
        if: matrix.platform != 'android'
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Restore Android Firebase config
        if: matrix.platform == 'android'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SERVICES_JSON_B64}" ]; then
            echo "Missing GitHub secret ANDROID_GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "${GOOGLE_SERVICES_JSON_B64}" | base64 --decode > android/app/google-services.json

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Verify Windows native assets
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $releaseDir = Get-Item "build\windows\*\runner\Release" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Windows release directory: $releaseDir"
          Get-ChildItem -Recurse $releaseDir -Filter *.dll | Select-Object FullName, Length

          $openMlsDll = Get-ChildItem -Recurse $releaseDir -Filter openmls_frb.dll | Select-Object -First 1
          if ($null -eq $openMlsDll) {
            Write-Error "openmls_frb.dll is missing from the Windows release bundle"
            exit 1
          }

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: flutter build linux --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: flutter build macos --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Bundle Homebrew dylibs (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(ls -d build/macos/Build/Products/Release/*.app | head -n 1)"
          APP_NAME="$(basename "$APP_PATH" .app)"
          APP_BIN="$APP_PATH/Contents/MacOS/$APP_NAME"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"

          mkdir -p "$FRAMEWORKS_DIR"

          QUEUE_FILE="$(mktemp)"
          SEEN_FILE="$(mktemp)"
          trap 'rm -f "$QUEUE_FILE" "$SEEN_FILE"' EXIT

          echo "$APP_BIN" >> "$QUEUE_FILE"

          bundle_deps() {
            local bin="$1"
            [ -f "$bin" ] || return 0

            otool -L "$bin" | tail -n +2 | awk '{print $1}' | while read -r dep; do
              case "$dep" in
                /opt/homebrew/*)
                  if [ ! -f "$dep" ]; then
                    continue
                  fi

                  local base dst
                  base="$(basename "$dep")"
                  dst="$FRAMEWORKS_DIR/$base"

                  if [ ! -f "$dst" ]; then
                    cp -f "$dep" "$dst"
                    chmod u+w "$dst"
                    install_name_tool -id "@rpath/$base" "$dst"
                    echo "$dst" >> "$QUEUE_FILE"
                  fi

                  install_name_tool -change "$dep" "@rpath/$base" "$bin" || true
                  ;;
              esac
            done
          }

          line_no=1
          while true; do
            current="$(sed -n "${line_no}p" "$QUEUE_FILE")"
            [ -n "$current" ] || break
            line_no=$((line_no + 1))

            [ -f "$current" ] || continue
            if grep -Fxq "$current" "$SEEN_FILE"; then
              continue
            fi
            echo "$current" >> "$SEEN_FILE"
            bundle_deps "$current"
          done

          echo "Bundled dylibs:"
          find "$FRAMEWORKS_DIR" -maxdepth 1 -type f -name "*.dylib" -print | sort

      - name: Build (Android arm64)
        if: matrix.platform == 'android' && matrix.arch == 'arm64'
        run: flutter build apk --release --target-platform android-arm64 --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (Android arm32)
        if: matrix.platform == 'android' && matrix.arch == 'arm32'
        run: flutter build apk --release --target-platform android-arm --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (Android x86_64)
        if: matrix.platform == 'android' && matrix.arch == 'x86_64'
        run: flutter build apk --release --target-platform android-x64 --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $releaseDir = Get-Item "build\windows\*\runner\Release" | Select-Object -First 1 -ExpandProperty FullName
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "sgtp-client-$env:GITHUB_REF_NAME-windows-${{ matrix.arch }}.zip"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd build/linux/*/release/bundle
          zip -r "$GITHUB_WORKSPACE/sgtp-client-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.zip" .

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/sgtp-client-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}.zip" *.app

      - name: Package (Android)
        if: matrix.platform == 'android'
        shell: bash
        run: cp build/app/outputs/flutter-apk/app-release.apk "sgtp-client-${GITHUB_REF_NAME}-android-${{ matrix.arch }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sgtp-client-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            sgtp-client-*.zip
            sgtp-client-*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sgtp-client-*.zip
            sgtp-client-*.apk
          generate_release_notes: true
