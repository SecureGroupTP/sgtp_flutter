name: sgtp_flutter
description: SGTP secure group chat client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  shared_preferences: ^2.3.3
  file_picker: ^8.1.4
  cryptography: ^2.7.0
  path_provider: ^2.1.4

  # Add these for full media support:
  # video_player: ^2.9.2       # video playback
  # record: ^5.2.4             # voice recording (requires mic permission)
  # audioplayers: ^6.1.0       # audio playback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
